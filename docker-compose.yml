version: '3.8'

services:
  # Database Service
  postgres:
    image: postgres:15-alpine
    container_name: naghma-db
    restart: always
    environment:
      POSTGRES_DB: naghma
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - naghma-network

  # Caching Service
  redis:
    image: redis:7-alpine
    container_name: naghma-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - naghma-network

  # Backend REST API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: naghma-api
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://admin:password123@postgres:5432/naghma
      REDIS_URL: redis://redis:6379
      YOUTUBE_API_KEY: "" # Inject key if available
    ports:
      - "5000:5000"
    networks:
      - naghma-network

  # Frontend Web Client
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: naghma-web
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - naghma-network

volumes:
  pgdata:
  redisdata:

networks:
  naghma-network:
    driver: bridge
